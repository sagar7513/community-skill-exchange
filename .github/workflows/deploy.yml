name: Build and Push Multi-Service to ECR

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: "us-east-1"

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR Public
      id: login-ecr-public
      uses: aws-actions/amazon-ecr-login@v2
      with:
        registry-type: public


    # --- BACKEND BUILD & PUSH ---
    - name: Build and Push Backend
      env: 
        ECR_REGISTRY: "public.ecr.aws/v2d4y3y5"
        ECR_REPOSITORY: "personal-projects"
        IMAGE_TAG: backend-${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./backend
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

    # --- FRONTEND BUILD & PUSH ---
    - name: Build and Push Frontend
      env: 
        ECR_REGISTRY: "public.ecr.aws/v2d4y3y5"
        ECR_REPOSITORY: "personal-projects"
        IMAGE_TAG: frontend-${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./frontend
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest



    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: "ec2-user"
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Login to ECR on the EC2 host
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws/v2d4y3y5
          
          # Navigate to project directory (where docker-compose.yml lives)
          cd ~/community-skill-exchange
          # If repo doesn't exist, clone it; else pull
            echo "Checking git and pulling changes"
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git pull origin main
            fi
          ./scripts/deploy.sh