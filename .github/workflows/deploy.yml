name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user  # Updated for Amazon Linux
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to app directory
            echo "Changing directory"

            cd ~/community-skill-exchange
            
            # If repo doesn't exist, clone it; else pull
            echo "Checking git and pulling changes"
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git pull origin main
            fi
            
            echo "Starting docker containers."
            if [ -n "$(docker-compose ps -q --status running)" ]; then
                echo "Containers are running. Restarting with build..."
                docker-compose down
                docker-compose up --build -d
            else
                echo "No containers running. Starting fresh..."
                docker-compose up -d
            fi
            